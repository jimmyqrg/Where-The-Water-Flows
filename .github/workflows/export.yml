# Export Godot game to HTML5 and upload the web build as an artifact.
# Put your Godot project (with project.godot and export_presets.cfg) in the
# folder set by project_path, then run this workflow from the Actions tab.

name: Export Web Build

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: 'Path to Godot project (folder containing project.godot)'
        required: true
        default: 'game'
      godot_version:
        description: 'Godot version (e.g. 4.2, 4.3, 4.4)'
        required: true
        default: '4.4'

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: ${{ github.event.inputs.godot_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Godot project
        run: |
          if [ ! -f "${{ github.event.inputs.project_path }}/project.godot" ]; then
            echo "::error::No project.godot found in '${{ github.event.inputs.project_path }}'."
            exit 1
          fi
          if [ ! -f "${{ github.event.inputs.project_path }}/export_presets.cfg" ]; then
            echo "::error::No export_presets.cfg in '${{ github.event.inputs.project_path }}'. Open your project in Godot → Project → Export → Add Web preset → Save."
            exit 1
          fi
          echo "Found project.godot and export_presets.cfg."

      - name: Download Godot
        run: |
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"

          echo "Downloading Godot from: $GODOT_URL"
          echo "Downloading templates from: $TEMPLATES_URL"

          mkdir -p /tmp/godot
          wget -q "$GODOT_URL" -O /tmp/godot/godot.zip || { echo "::error::Failed to download Godot. Check that version '${GODOT_VERSION}' exists."; exit 1; }
          wget -q "$TEMPLATES_URL" -O /tmp/godot/templates.tpz || { echo "::error::Failed to download export templates."; exit 1; }

      - name: Install Godot
        run: |
          cd /tmp/godot
          unzip -o godot.zip
          GODOT_BIN=$(find . -maxdepth 1 -name 'Godot_v*' -type f | head -1)
          chmod +x "$GODOT_BIN"
          sudo mv "$GODOT_BIN" /usr/local/bin/godot
          echo "Godot binary installed: $(godot --version 2>&1 || true)"

      - name: Install export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          cd /tmp/godot
          unzip -o templates.tpz
          mv templates/* "$TEMPLATE_DIR/" 2>/dev/null || true
          echo "Templates installed to $TEMPLATE_DIR"
          ls "$TEMPLATE_DIR" | head -20

      - name: Export project
        run: |
          mkdir -p /tmp/web-build
          cd "${{ github.event.inputs.project_path }}"

          # Let Godot import assets first
          timeout 120 godot --headless --import . 2>&1 || true

          # Find the Web export preset name
          PRESET=$(grep -oP '(?<=name=").*?(?=")' export_presets.cfg | head -1)
          echo "Using export preset: $PRESET"

          # Export
          godot --headless --export-release "$PRESET" /tmp/web-build/index.html 2>&1

          echo "Export complete. Files:"
          ls -la /tmp/web-build/

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: /tmp/web-build/
